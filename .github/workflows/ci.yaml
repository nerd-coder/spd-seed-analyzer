name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  BUN_VERSION: '1.3.14'
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v7

      - name: 🏗️ Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🏗️ Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 🏗️ Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: 🏗️ Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            .
            crates/spd-wasm -> ../../target
          shared-key: wasm

      - name: 🏗️ Install wasm-pack
        uses: qmaru/wasm-pack-action@v0.6.0
        with:
          version: 'latest'

      - name: ✅ Biome check
        run: bun run check

      - name: ✅ Rust fmt + clippy
        run: bun run check:rust

      - name: 🧪 Rust tests
        run: bun run test:rust

      - name: 🏗️ Build (wasm + web)
        run: bun run build

  deploy:
    needs: check
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v7

      - name: 🏗️ Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🏗️ Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 🏗️ Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 🏗️ Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            .
            crates/spd-wasm -> ../../target
          shared-key: wasm

      - name: 🏗️ Install wasm-pack
        uses: qmaru/wasm-pack-action@v0.6.0
        with:
          version: 'latest'

      - name: ✅ Validate deployment config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WEB_WORKER_NAME: ${{ vars.WEB_WORKER_NAME }}
        run: |
          set -euo pipefail
          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            WEB_WORKER_NAME
          do
            : "${!name:?${name} is required}"
          done

      - name: 🏗️ Build (wasm + web)
        run: bun run build

      - name: 🚀 Deploy web Worker
        id: deploy
        working-directory: web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
          WEB_URL: ${{ vars.WEB_URL }}
          WEB_WORKER_NAME: ${{ vars.WEB_WORKER_NAME }}
        run: |
          set -euo pipefail

          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            WEB_WORKER_NAME
          do
            : "${!name:?${name} is required}"
          done

          DEPLOY_ARGS=(deploy --name "${WEB_WORKER_NAME}")

          if [[ -n "${WEB_DOMAIN:-}" ]]; then
            DEPLOY_ARGS+=(--domain "${WEB_DOMAIN}")
          fi

          bunx wrangler "${DEPLOY_ARGS[@]}"

          if [[ -n "${WEB_URL:-}" ]]; then
            echo "url=${WEB_URL}" >> "${GITHUB_OUTPUT}"
          elif [[ -n "${WEB_DOMAIN:-}" ]]; then
            echo "url=https://${WEB_DOMAIN}" >> "${GITHUB_OUTPUT}"
          else
            echo "url=https://${WEB_WORKER_NAME}.workers.dev" >> "${GITHUB_OUTPUT}"
          fi

      - name: 📝 Job summary
        env:
          WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
          WEB_URL: ${{ vars.WEB_URL }}
          WEB_WORKER_NAME: ${{ vars.WEB_WORKER_NAME }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          {
            echo '## Web deploy'
            echo
            echo '| Field | Value |'
            echo '| --- | --- |'
            echo "| Worker | \`${WEB_WORKER_NAME}\` |"
            echo "| Domain | ${WEB_DOMAIN:-*(workers.dev)*} |"
            echo "| URL | ${DEPLOY_URL} |"
          } >> "${GITHUB_STEP_SUMMARY}"
